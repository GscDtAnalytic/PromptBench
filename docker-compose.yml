services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: promptbench
      POSTGRES_PASSWORD: promptbench
      POSTGRES_DB: promptbench
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptbench"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://promptbench:promptbench@postgres:5432/promptbench
      DATABASE_URL_SYNC: postgresql+psycopg://promptbench:promptbench@postgres:5432/promptbench
      REDIS_URL: redis://redis:6379/0
      MODEL_PROVIDER: ${MODEL_PROVIDER:-fake}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./datasets:/datasets:ro
      - ./prompts:/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: arq app.workers.tasks.WorkerSettings
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://promptbench:promptbench@postgres:5432/promptbench
      DATABASE_URL_SYNC: postgresql+psycopg://promptbench:promptbench@postgres:5432/promptbench
      REDIS_URL: redis://redis:6379/0
      MODEL_PROVIDER: ${MODEL_PROVIDER:-fake}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - ./datasets:/datasets:ro
      - ./prompts:/prompts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      API_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
